name: CI

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      # New commits pushed to the HEAD of an open PR.
      - synchronize

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    name: Test (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    # Matrix mirrors awsum/.github/workflows/check-and-build.yml: the second
    # Windows job swaps LLVM-MSVC for WinLibs's LLVM-MinGW, exercising the
    # released awsum.exe against both flavors of user-installed clang.
    # `asset` is the release-archive identifier on GitHub Releases (only one
    # awsum.exe is published — both Windows jobs download the same archive).
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-24.04,     target: linux-x86_64-gnu,     asset: linux-x86_64-gnu,  llvm-flavor: apt   }
          - { os: ubuntu-24.04-arm, target: linux-aarch64-gnu,    asset: linux-aarch64-gnu, llvm-flavor: apt   }
          - { os: macos-15,         target: macos-aarch64,        asset: macos-aarch64,     llvm-flavor: brew  }
          - { os: windows-2025,     target: windows-x86_64,       asset: windows-x86_64,    llvm-flavor: msvc  }
          - { os: windows-2025,     target: windows-x86_64-mingw, asset: windows-x86_64,    llvm-flavor: mingw }

    env:
      # Compiler version downloaded from awsum-lang/awsum GitHub Releases.
      AWSUM_VERSION: 0.0.4

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v6

      # The LLVM backend pipes generated `.ll` through `clang`, which must be
      # LLVM 15+ for opaque pointers. Per-OS install mechanisms mirror
      # awsum/.github/workflows/check-and-build.yml — see that file for the
      # detailed reasoning behind each choice.

      - name: Set up LLVM 15 (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-15
          sudo ln -sf /usr/bin/clang-15 /usr/local/bin/clang

      - name: Set up LLVM 15 (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install llvm@15
          echo "$(brew --prefix llvm@15)/bin" >> "$GITHUB_PATH"

      - name: Set up LLVM 15 (Windows MSVC)
        if: matrix.llvm-flavor == 'msvc'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $url  = "https://github.com/llvm/llvm-project/releases/download/llvmorg-15.0.7/LLVM-15.0.7-win64.exe"
          $exe  = "$env:RUNNER_TEMP\llvm-installer.exe"
          $dest = "$env:RUNNER_TEMP\llvm"
          curl.exe -fsSL --retry 3 --retry-delay 2 -o $exe $url
          $size = (Get-Item $exe).Length
          if ($size -lt 1000000) {
            throw "LLVM installer is only $size bytes — download likely failed"
          }
          Start-Process -FilePath $exe -ArgumentList "/S","/D=$dest" -Wait -NoNewWindow
          if (-not (Test-Path "$dest\bin\clang.exe")) {
            throw "clang.exe not found at $dest\bin after install"
          }
          Add-Content -Path $env:GITHUB_PATH -Value "$dest\bin"

      # Second Windows axis — WinLibs's mingw-w64-flavored LLVM, contrasted
      # with the MSVC-flavored llvm-project build on the canonical Windows
      # job. The released awsum.exe is the same archive in both jobs;
      # what differs is which clang flavor the runtime invokes when
      # `awsum run -t llvm` shells out.
      - name: Set up LLVM 19 (Windows MinGW)
        if: matrix.llvm-flavor == 'mingw'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $tag     = "14.2.0posix-12.0.0-ucrt-r3"  # GCC 14.2.0 + LLVM 19.1.7 + mingw-w64 12.0.0 + UCRT
          $file    = "winlibs-x86_64-posix-seh-gcc-14.2.0-llvm-19.1.7-mingw-w64ucrt-12.0.0-r3.7z"
          $url     = "https://github.com/brechtsanders/winlibs_mingw/releases/download/$tag/$file"
          $archive = "$env:RUNNER_TEMP\winlibs.7z"
          $extract = "$env:RUNNER_TEMP\winlibs-extract"
          $dest    = "$env:RUNNER_TEMP\llvm"
          curl.exe -fsSL --retry 3 --retry-delay 2 -o $archive $url
          $size = (Get-Item $archive).Length
          if ($size -lt 50000000) {
            throw "WinLibs archive is only $size bytes — download likely failed"
          }
          New-Item -ItemType Directory -Path $extract -Force | Out-Null
          & 7z x $archive "-o$extract" -y -bd | Out-Null
          if ($LASTEXITCODE -ne 0) {
            throw "7z extraction failed with exit $LASTEXITCODE"
          }
          Move-Item "$extract\mingw64" $dest
          if (-not (Test-Path "$dest\bin\clang.exe")) {
            throw "clang.exe not found at $dest\bin after extract"
          }
          Add-Content -Path $env:GITHUB_PATH -Value "$dest\bin"

      - name: Verify clang resolves to LLVM 15+
        run: |
          set -eu
          clang --version
          if clang --version | head -n1 | grep -qE 'version (1[5-9]|[2-9][0-9])\.'; then
            echo "OK: clang is LLVM 15+"
          else
            echo "ERROR: clang is older than LLVM 15"
            exit 1
          fi

      # JVM / CLR / WASM / JS runtimes. Versions match
      # awsum/.github/workflows/check-and-build.yml — drift means a
      # demo could pass on a runtime version the compiler's own
      # tests don't cover.

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "11"

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "9"

      - name: Set up Wasmtime
        uses: bytecodealliance/actions/wasmtime/setup@v1
        with:
          version: "latest"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install awsum from GitHub Release (Unix)
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          url="https://github.com/awsum-lang/awsum/releases/download/v${AWSUM_VERSION}/awsum-${AWSUM_VERSION}-${{ matrix.asset }}.tar.gz"
          dest="$RUNNER_TEMP/awsum"
          mkdir -p "$dest"
          curl -fsSL --retry 3 --retry-delay 2 -o "$dest/awsum.tar.gz" "$url"
          tar -C "$dest" -xzf "$dest/awsum.tar.gz"
          chmod +x "$dest/awsum"
          echo "$dest" >> "$GITHUB_PATH"

      - name: Install awsum from GitHub Release (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $url  = "https://github.com/awsum-lang/awsum/releases/download/v$env:AWSUM_VERSION/awsum-$env:AWSUM_VERSION-${{ matrix.asset }}.zip"
          $zip  = "$env:RUNNER_TEMP\awsum.zip"
          $dest = "$env:RUNNER_TEMP\awsum"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          curl.exe -fsSL --retry 3 --retry-delay 2 -o $zip $url
          Expand-Archive -Path $zip -DestinationPath $dest -Force
          Add-Content -Path $env:GITHUB_PATH -Value $dest

      - name: Verify awsum
        run: awsum --version

      - name: Run recursion-and-memory-safety demo on every target
        run: |
          set -euo pipefail
          expected="100000"
          for target in llvm jvm clr wasm js; do
            echo "=== $target ==="
            actual=$(awsum run --program-type cli -t "$target" recursion-and-memory-safety/Main.aww)
            if [[ "$actual" != "$expected" ]]; then
              printf 'target=%s\nexpected: %s\nactual:   %s\n' "$target" "$expected" "$actual"
              exit 1
            fi
            echo "OK: $actual"
          done
